<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="back-btn">
        <ion-icon name="chevron-back" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Buat Post</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" scrollEvents="true">
  <input
    type="file"
    id="fileInput"
    accept="image/jpeg,image/jpg,image/png,image/webp"
    style="display: none"
    (change)="onFileSelected($event)"
  />

  <!-- Step: Select Image -->
  @if (!imageLoaded()) {
  <div class="select-wrap">
    <div class="upload-area" (click)="onFileInputClick()">
      <div class="upload-icon-wrap">
        <ion-icon name="image-outline" class="upload-icon"></ion-icon>
      </div>
      <span class="upload-label">Pilih foto dari galeri</span>
      <span class="upload-sublabel">JPEG, PNG, WebP — maks. 5MB</span>
      <button
        class="pick-btn"
        (click)="$event.stopPropagation(); onFileInputClick()"
      >
        Pilih Foto
      </button>
    </div>
  </div>
  }

  <!-- Step: Crop (show after image selected, before crop) -->
  @if (imageLoaded() && !croppedDataUrl()) {
  <div class="crop-section">
    <p class="crop-hint">Geser kotak untuk memilih area</p>
    <div class="crop-container" #cropContainer>
      <canvas #cropCanvas class="crop-canvas"></canvas>
    </div>
    <button class="crop-btn" (click)="cropImage()">
      <ion-icon name="crop-outline"></ion-icon>
      Crop Foto
    </button>
  </div>
  }

  <!-- Step: Preview + Caption + Send (show after crop) -->
  @if (croppedDataUrl()) {
  <div class="content-section">
    <!-- Preview Image -->
    <div class="preview-wrap">
      <img [src]="croppedDataUrl()" class="preview-img" alt="Preview" />
      <button class="clear-btn" (click)="clearImage()">
        <ion-icon name="close-circle-outline"></ion-icon>
      </button>
    </div>

    <!-- Caption Input -->
    <div class="caption-card">
      <textarea
        class="caption-input"
        placeholder="Tulis caption..."
        rows="4"
        [(ngModel)]="caption"
      ></textarea>
      <div class="char-count" [class.warn]="isNearLimit()">
        {{ captionLength() }} / {{ MAX_CAPTION }}
      </div>
    </div>

    <!-- Send Button -->
    <button
      class="post-btn"
      [class.active]="canPost()"
      [disabled]="!canPost() || isSubmitting()"
      (click)="onPost()"
    >
      @if (isSubmitting()) {
      <ion-spinner name="crescent" class="btn-spinner"></ion-spinner>
      } @else {
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
      } Send
    </button>
  </div>
  }
</ion-content>
