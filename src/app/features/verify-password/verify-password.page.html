<ion-content [fullscreen]="true">
  <div class="flex flex-col justify-start min-h-full px-8 bg-gray-50">
    <ion-icon
      name="arrow-back-outline"
      class="mt-10 text-2xl cursor-pointer"
      (click)="router.navigate(['/verify-username'])"
    ></ion-icon>

    <h1 class="text-3xl mt-6 font-bold">Create a password</h1>
    <p class="text-sm mt-3 text-[#6C757D]">
      Use at least 8 characters. Make it strong.
    </p>

    <form class="flex flex-col gap-4 mt-6" (ngSubmit)="submit()">
      <input
        type="text"
        name="username"
        autocomplete="username"
        class="hidden"
      />
      <!-- Password -->
      <div class="relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="data.password"
          name="password"
          autocomplete="new-password"
          placeholder=" "
          (keyup.enter)="submit()"
          class="peer w-full px-4 pt-5 pb-2 pr-12 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-[#007BFF] text-sm"
        />
        <label
          class="absolute left-4 top-1 text-xs text-[#007BFF] transition-all pointer-events-none peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-focus:top-1 peer-focus:text-xs peer-focus:text-[#007BFF]"
        >
          Password
        </label>
        <button
          type="button"
          (click)="showPassword = !showPassword"
          class="absolute right-4 top-[1.1rem] text-gray-400"
        >
          <ion-icon
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
            class="text-xl"
          ></ion-icon>
        </button>
        @if (errors['password']) {
        <p class="text-red-400 text-sm mt-2 ml-1">{{ errors['password'] }}</p>
        }
      </div>

      <!-- Confirm Password -->
      <div class="relative">
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          autocomplete="new-password"
          placeholder=" "
          (keyup.enter)="submit()"
          class="peer w-full px-4 pt-5 pb-2 pr-12 rounded-xl border border-gray-200 bg-white focus:outline-none focus:border-[#007BFF] text-sm"
        />
        <label
          class="absolute left-4 top-1 text-xs text-[#007BFF] transition-all pointer-events-none peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-sm peer-placeholder-shown:text-gray-400 peer-focus:top-1 peer-focus:text-xs peer-focus:text-[#007BFF]"
        >
          Confirm Password
        </label>
        <button
          type="button"
          (click)="showConfirmPassword = !showConfirmPassword"
          class="absolute right-4 top-[1.1rem] text-gray-400"
        >
          <ion-icon
            [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"
            class="text-xl"
          ></ion-icon>
        </button>
        @if (errors['confirmPassword']) {
        <p class="text-red-400 text-sm mt-2 ml-1">
          {{ errors['confirmPassword'] }}
        </p>
        }
      </div>

      @if (errors['general']) {
      <p class="text-red-400 text-sm">{{ errors['general'] }}</p>
      }

      <button
        type="submit"
        [disabled]="loading"
        class="w-full py-3 rounded-xl bg-[#007BFF] text-white font-semibold text-sm disabled:opacity-50 mt-1"
      >
        {{ loading ? 'Creating account...' : 'Finish' }}
      </button>
    </form>
  </div>
</ion-content>
